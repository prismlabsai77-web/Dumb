name: HiveStream Factory

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  hive_scout:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. We skip actions/setup-python to use the pre-installed System Python.
      # This allows us to use 'apt-get' packages like python3-libtorrent easily.

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-libtorrent python3-pip

      - name: Install Python Dependencies
        # Use --break-system-packages because Ubuntu 24.04+ requires it 
        # for installing pip packages globally in Actions.
        run: |
          pip install supabase requests beautifulsoup4 --break-system-packages

      - name: Run Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TMDB_KEY: ${{ secrets.TMDB_KEY }}
        run: python3 core_sync.py
