name: HiveStream Factory

on:
  schedule:
    - cron: '0 */6 * * *' # Perfection: Runs every 6 hours (4x a day)
  workflow_dispatch:      # Manual trigger: Lets you test with one click

jobs:
  build_and_scrape:
    runs-on: ubuntu-latest
    
    # Preventing log leaks
    permissions:
      contents: read

    steps:
      # 1. Pull the latest code from your repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup a stable Python environment (3.10 is the 2026 sweet spot for stability)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Speeds up future runs by caching libraries

      # 3. Install the "Muscle" (System libraries for torrenting)
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libtorrent-rasterbar-dev

      # 4. Install the "Brain" (Python libraries)
      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip
          pip install supabase requests beautifulsoup4 python-libtorrent

      # 5. Execute the HiveScout
      - name: Run HiveStream Scraper
        env:
          # Mapping your GitHub Secrets to Environment Variables
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TMDB_KEY: ${{ secrets.TMDB_KEY }}
        run: python core_sync.py
