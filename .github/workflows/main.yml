name: HiveStream Factory

on:
  schedule:
    - cron: '0 */6 * * *' # Perfection: Runs every 6 hours
  workflow_dispatch:      # Manual trigger: Lets you test with one click

jobs:
  hive_scout:
    runs-on: ubuntu-latest
    
    # Secure the environment
    permissions:
      contents: read

    steps:
      # 1. Pull the latest code from your repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Python with automated caching
      # This looks for your requirements.txt file to create a unique cache key
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' 

      # 3. Install System Dependencies (Required for libtorrent)
      - name: Install libtorrent-system
        run: |
          sudo apt-get update
          sudo apt-get install -y libtorrent-rasterbar-dev

      # 4. Install Python packages from requirements.txt
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 5. Execute the HiveStream logic
      - name: Run Scraper
        env:
          # Mapping your GitHub Secrets to Environment Variables
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TMDB_KEY: ${{ secrets.TMDB_KEY }}
        run: python core_sync.py
