name: HiveStream Industrial Sync

on:
  schedule:
    # Runs every 6 hours to keep the "Modern Era" updated
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows you to trigger it manually for the first big harvest

jobs:
  build:
    runs-on: ubuntu-latest
    # Prevents multiple runs from clashing if a harvest takes a long time
    concurrency: 
      group: sync-group
      cancel-in-progress: false 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Speeds up subsequent runs

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests supabase

      - name: Run Industrial Harvester
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TMDB_KEY: ${{ secrets.TMDB_API_KEY }}
        # We use a 5-hour timeout to stay safe within GitHub's 6-hour limit
        run: |
          timeout 300m python3 core_sync.py || echo "Sync timed out, but state is saved in Supabase!"

      - name: Keep-Alive (Hack)
        # This keeps the repository active even if you don't commit for 60 days
        uses: gautamkrishnar/keepalive-workflow@v1
